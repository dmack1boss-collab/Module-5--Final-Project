<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Movie</title>
    <script src="index.js"defer></script>
    <script src="https://kit.fontawesome.com/e92efa1168.js" crossorigin="anonymous"></script>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<!-- NAVIGATION -->
<nav>
    <div class="container nav__container">
        <div class="movie__logo">
            <img src="./assets/movie.png" alt="logo">
    
        </div>

        <div class="nav__links">
            <a href="#">Home</a>
            <a href="#">Find your Movie</a>
            <a href="#" class="nav__btn">Contact</a>
        </div>
    </div>
</nav>

<!-- HERO / BANNER -->
<section id="hero">
    <div class="hero__overlay">
        <h1>Browse our movies</h1>

        <div class="search__bar">
            <input type="text" placeholder="Search by Movie, Actor or Keyword">
            <i class="fa-solid fa-magnifying-glass"></i>
        </div>
    </div>
 <!-- Main Content -->
    <div class="container">
        <!-- Filter Section -->
        <div class="filter-section">
            <div class="filter-header">
                <h2>Search results:</h2>
            </div>
            
            <div class="filters-container">
                <div class="filter-group">
                    <label for="titleFilter">Filter by Title:</label>
                    <input 
                        type="text" 
                        id="titleFilter" 
                        class="filter-input" 
                        placeholder="Enter movie title...">
                </div>
                
                <div class="filter-group">
                    <label for="yearFilter">Filter by Year:</label>
                    <select id="yearFilter" class="filter-select">
                        <option value="">All Years</option>
                    </select>
                </div>
                
                <div class="filter-group">
                    <button id="resetBtn" class="reset-btn">Reset Filters</button>
                </div>
            </div>
        </div>

        <!-- Loading State -->
        <div id="loading" class="loading">Loading movies...</div>

        <!-- Error State -->
        <div id="error" class="error" style="display: none;">Failed to load movies. Please try again.</div>

        <!-- Movies Grid -->
        <div class="movies-grid" id="moviesGrid"></div>
    </div>

    <script src="script.js"></script>
</body>
</html>

</body>
</html>
</body>
</html>
