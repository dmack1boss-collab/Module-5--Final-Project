<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Movie</title>
    <script src="index.js"defer></script>
    <script src="https://kit.fontawesome.com/e92efa1168.js" crossorigin="anonymous"></script>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<!-- NAVIGATION -->
<nav>
    <div class="container nav__container">
        <div class="movie__logo">
            <img src="./assets/movie.png" alt="logo">
    
        </div>

        <div class="nav__links">
            <a href="#">Home</a>
            <a href="#">Find your Movie</a>
            <a href="#" class="nav__btn">Contact</a>
        </div>
    </div>
</nav>

<!-- HERO / BANNER -->
<section id="hero">
    <div class="hero__overlay">
        <h1>Browse our movies</h1>

        <div class="search__bar">
            <input type="text" placeholder="Search by Movie, Actor or Keyword">
            <i class="fa-solid fa-magnifying-glass"></i>
        </div>
    </div>
 <!-- Main Content -->
    <div class="container">
        <!-- Filter Section -->
        <div class="filter-section">
            <div class="filter-header">
                <h2>Search results:</h2>
            </div>
            
            <!-- Single Dropdown Button -->
            <div class="filter-dropdown-wrapper">
                <button class="filter-dropdown-btn" id="filterDropdownBtn">
                    <span>Filter by Title & Year</span>
                    <i class="fa-solid fa-chevron-down"></i>
                </button>
                
                <!-- Dropdown Content -->
                <div class="filter-dropdown-content" id="filterDropdown">
                    <div class="filter-dropdown-inner">
                        <input 
                            type="text" 
                            id="titleFilter" 
                            class="filter-input" 
                            placeholder="Search by title...">
                        
                        
                        <div class="filter-actions">
                            <button id="applyBtn" class="apply-btn">Apply</button>
                            <button id="resetBtn" class="reset-btn">Reset</button>
                        </div>
                    </div>
        </div>

        <!-- Loading State -->
        <div id="loading" class="loading">Loading movies...</div>

        <!-- Error State -->
        <div id="error" class="error" style="display: none;">Failed to load movies. Please try again.</div>

        <!-- Movies Grid -->
        <div class="movies-grid" id="moviesGrid"></div>
    </div>

    
</body>
</html>

</body>
</html>
</body>
</html>
